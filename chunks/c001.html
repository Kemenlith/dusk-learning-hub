<style>
/* ── CSS Custom Properties ── */
:root {
  --bg: #0f0f11;
  --surface: #1a1a2e;
  --surface2: #16213e;
  --surface3: #0d1b2a;
  --border: rgba(139,92,246,0.15);
  --border-subtle: rgba(255,255,255,0.06);
  --purple: #8B5CF6;
  --purple-dark: #6D28D9;
  --purple-light: #a78bfa;
  --purple-faint: rgba(139,92,246,0.1);
  --text: #e2e8f0;
  --text-muted: #94a3b8;
  --text-dim: #64748b;
  --green: #10b981;
  --red: #ef4444;
  --yellow: #f59e0b;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --sidebar-w: 240px;
  --header-h: 60px;
  --radius: 8px;
  --radius-lg: 12px;
  --transition: 180ms cubic-bezier(0.16,1,0.3,1);
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}
img, svg { display: block; max-width: 100%; }
a { color: var(--purple-light); text-decoration: none; }
a:hover { color: var(--purple); text-decoration: underline; }
ul, ol { padding-left: 1.25rem; }
li { margin-bottom: 0.35rem; }
code { font-family: var(--font-mono); font-size: 0.85em; }

/* ── Layout ── */
#app { display: flex; min-height: 100vh; }

/* ── Sidebar ── */
#sidebar {
  width: var(--sidebar-w);
  position: fixed;
  top: 0; left: 0; bottom: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  z-index: 100;
  transition: transform var(--transition);
}
#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-track { background: transparent; }
#sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.sidebar-logo {
  padding: 1.25rem 1rem 1rem;
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  gap: 0.75rem;
  text-decoration: none;
}
.sidebar-logo:hover { text-decoration: none; }
.logo-mark {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--purple), var(--purple-dark));
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-text { font-size: 0.8rem; font-weight: 600; color: var(--text); line-height: 1.2; }
.logo-sub { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }

.sidebar-search-btn {
  margin: 0.75rem 0.75rem 0;
  padding: 0.5rem 0.75rem;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  color: var(--text-dim);
  font-size: 0.75rem;
  font-family: var(--font-body);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  transition: background var(--transition), border-color var(--transition);
}
.sidebar-search-btn:hover { background: rgba(139,92,246,0.08); border-color: var(--border); color: var(--text-muted); }
.sidebar-search-btn kbd {
  margin-left: auto;
  font-size: 0.65rem;
  background: rgba(255,255,255,0.06);
  padding: 0.1rem 0.35rem;
  border-radius: 3px;
  font-family: var(--font-mono);
}

.sidebar-nav { flex: 1; padding: 0.5rem 0; }
.nav-group { margin-bottom: 0.25rem; }
.nav-group-label {
  font-size: 0.62rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  padding: 0.75rem 1rem 0.25rem;
}
.nav-link {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.45rem 1rem;
  font-size: 0.78rem;
  color: var(--text-muted);
  text-decoration: none;
  border-left: 2px solid transparent;
  transition: all var(--transition);
  line-height: 1.3;
}
.nav-link:hover { color: var(--text); background: rgba(139,92,246,0.06); text-decoration: none; }
.nav-link.active { color: var(--purple-light); border-left-color: var(--purple); background: rgba(139,92,246,0.08); }
.nav-num {
  font-size: 0.65rem;
  font-family: var(--font-mono);
  color: var(--text-dim);
  min-width: 1.2rem;
}

/* ── Mobile Header ── */
#mobile-header {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: rgba(15,15,17,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  align-items: center;
  padding: 0 1rem;
  gap: 0.75rem;
  z-index: 200;
}
#hamburger {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0.5rem;
  color: var(--text-muted);
}
#mobile-logo { font-size: 0.85rem; font-weight: 600; color: var(--text); }

/* ── Main Content ── */
#main {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-width: 0;
}

/* ── Sections ── */
.section {
  padding: 4rem 3rem;
  border-bottom: 1px solid var(--border-subtle);
  max-width: 960px;
  opacity: 1;
}

/* ── Section Headers ── */
.section-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--purple-light);
  background: rgba(139,92,246,0.12);
  border: 1px solid rgba(139,92,246,0.2);
  padding: 0.25rem 0.6rem;
  border-radius: 20px;
  margin-bottom: 0.75rem;
}
.section-title {
  font-size: 1.8rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 0.5rem;
  line-height: 1.2;
}
.section-subtitle {
  font-size: 0.95rem;
  color: var(--text-muted);
  margin-bottom: 2rem;
  max-width: 65ch;
}

/* ── SVG Diagram Container ── */
.diagram {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  margin-bottom: 2rem;
  overflow: hidden;
}
.diagram svg { width: 100%; height: auto; }

/* ── Content Grid ── */
.content-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.content-card {
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 1.25rem;
  transition: border-color var(--transition);
}
.content-card:hover { border-color: var(--border); }
.card-title {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--purple-light);
  margin-bottom: 0.5rem;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.card-body { font-size: 0.82rem; color: var(--text-muted); }
.card-body ul { padding-left: 1rem; }
.card-body li { margin-bottom: 0.25rem; }

/* ── Key Points ── */
.key-points {
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1.5rem;
}
.key-points-title {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  margin-bottom: 0.75rem;
}
.key-point {
  display: flex;
  align-items: flex-start;
  gap: 0.6rem;
  padding: 0.4rem 0;
  font-size: 0.83rem;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border-subtle);
}
.key-point:last-child { border-bottom: none; }
.kp-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--purple);
  margin-top: 0.45rem;
  flex-shrink: 0;
}

/* ── Code Blocks ── */
.code-block-wrap {
  position: relative;
  margin-bottom: 1.25rem;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid rgba(139,92,246,0.2);
}
.code-block-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(26,26,46,0.8);
  padding: 0.5rem 1rem;
  border-bottom: 1px solid rgba(139,92,246,0.15);
}
.code-lang {
  font-size: 0.65rem;
  font-family: var(--font-mono);
  color: var(--purple-light);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.copy-btn {
  background: none;
  border: 1px solid var(--border-subtle);
  border-radius: 4px;
  padding: 0.2rem 0.5rem;
  font-size: 0.65rem;
  color: var(--text-dim);
  cursor: pointer;
  font-family: var(--font-body);
  transition: all var(--transition);
}
.copy-btn:hover { border-color: var(--purple); color: var(--purple-light); }
.copy-btn.copied { color: var(--green); border-color: var(--green); }
.code-block-wrap pre {
  margin: 0 !important;
  border-radius: 0 !important;
  background: #0d0d1a !important;
  font-size: 0.78rem;
  line-height: 1.6;
  max-height: 400px;
  overflow-y: auto;
}
.code-block-wrap pre code { font-size: 0.78rem; }

/* ── Links Row ── */
.doc-links {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-top: 1rem;
}
.doc-link {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  font-size: 0.72rem;
  color: var(--text-dim);
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border-subtle);
  padding: 0.3rem 0.65rem;
  border-radius: 20px
