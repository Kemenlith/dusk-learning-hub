name: Assemble index.html
on:
  push:
    paths:
      - 'chunks/c018.html'
    branches:
      - main
jobs:
  assemble:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Assemble index.html
        run: |
          cat chunks/c001.html chunks/c002.html chunks/c003.html chunks/c004.html chunks/c005.html chunks/c006.html chunks/c007.html chunks/c008.html chunks/c009.html chunks/c010.html chunks/c011.html chunks/c012.html chunks/c013.html chunks/c014.html chunks/c015.html chunks/c016.html chunks/c017.html chunks/c018.html > index.html
          echo "Assembled: $(wc -c < index.html) bytes"
      - name: Remove chunks and commit
        run: |
          rm -rf chunks/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git rm -r --cached chunks/ 2>/dev/null || true
          git commit -m "v8: Full site with ecosystem projects section"
          git push
